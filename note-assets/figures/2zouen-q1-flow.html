<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8">
<style>
 body{margin:0;background:#fff;font-family:"Yu Gothic","Meiryo",sans-serif;}
 .wrap{padding:20px;width:1000px;}
 h3{font-size:20px;margin:6px 0 14px;}
 .cap{font-size:15px;color:#555;margin-top:10px;}
</style></head>
<body>
<div class="wrap">
<h3>問題1(2)(イ) 高木移植の掘取り〜植付け作業手順</h3>
<svg width="960" height="240" viewBox="0 0 960 240" xmlns="http://www.w3.org/2000/svg">
 <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#333"/></marker></defs>
 <style>
  .b{fill:#fff;stroke:#333;stroke-width:1.8;}
  .blank{fill:#fdeaea;stroke:#c0392b;stroke-width:2;}
  .t{font-size:14px;text-anchor:middle;}
  .bl{font-size:18px;font-weight:bold;text-anchor:middle;fill:#c0392b;}
  .e{stroke:#333;stroke-width:1.6;marker-end:url(#a);}
 </style>
 <!-- row1 -->
 <g>
  <rect class="b" x="10" y="20" width="86" height="44" rx="5"/><text class="t" x="53" y="40">準備工</text>
  <rect class="b" x="120" y="20" width="86" height="44" rx="5"/><text class="t" x="163" y="40">鉢径の</text><text class="t" x="163" y="56">決定</text>
  <rect class="b" x="230" y="20" width="86" height="44" rx="5"/><text class="t" x="273" y="46">掘回し</text>
  <rect class="blank" x="340" y="20" width="86" height="44" rx="5"/><text class="bl" x="383" y="48">A</text>
  <rect class="b" x="450" y="20" width="86" height="44" rx="5"/><text class="t" x="493" y="46">枝しおり</text>
  <rect class="blank" x="560" y="20" width="86" height="44" rx="5"/><text class="bl" x="603" y="48">B</text>
  <rect class="b" x="670" y="20" width="100" height="44" rx="5"/><text class="t" x="720" y="40">積込み・</text><text class="t" x="720" y="56">運搬</text>
  <rect class="b" x="794" y="20" width="86" height="44" rx="5"/><text class="t" x="837" y="40">位置</text><text class="t" x="837" y="56">だし</text>
  <path class="e" d="M96,42 L118,42"/><path class="e" d="M206,42 L228,42"/><path class="e" d="M316,42 L338,42"/>
  <path class="e" d="M426,42 L448,42"/><path class="e" d="M536,42 L558,42"/><path class="e" d="M646,42 L668,42"/><path class="e" d="M770,42 L792,42"/>
 </g>
 <!-- down -->
 <path class="e" d="M837,64 L837,90"/>
 <!-- row2 (right to left) -->
 <g>
  <rect class="blank" x="794" y="92" width="86" height="44" rx="5"/><text class="bl" x="837" y="120">C</text>
  <rect class="b" x="670" y="92" width="100" height="44" rx="5"/><text class="t" x="720" y="118">立込み</text>
  <rect class="b" x="560" y="92" width="86" height="44" rx="5"/><text class="t" x="603" y="118">埋戻し</text>
  <rect class="b" x="430" y="92" width="116" height="44" rx="5"/><text class="t" x="488" y="112">水鉢を</text><text class="t" x="488" y="128">切る</text>
  <rect class="b" x="320" y="92" width="86" height="44" rx="5"/><text class="t" x="363" y="118">支柱</text>
  <rect class="b" x="210" y="92" width="86" height="44" rx="5"/><text class="t" x="253" y="118">養生</text>
  <path class="e" d="M792,114 L772,114"/><path class="e" d="M668,114 L648,114"/><path class="e" d="M558,114 L548,114"/><path class="e" d="M428,114 L408,114"/><path class="e" d="M318,114 L298,114"/>
 </g>
 <text x="480" y="180" font-size="16" fill="#333" text-anchor="middle">〔選択欄〕穴上げ／ふるい掘り／布掛／根巻き／客土／植穴掘り／耕耘</text>
</svg>
<p class="cap">A・B・C（赤）が空欄。掘回しの後に根を保護し、枝をしおった後に穴から出し、新植地で位置だし後に穴を掘る、という流れで考えます。</p>
</div>
</body></html>

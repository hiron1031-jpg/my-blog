<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><style>
body { margin:0; background:#fff; font-family:"Yu Gothic","Meiryo",sans-serif; }
.wrap { padding:16px 20px; width:820px; }
table { border-collapse:collapse; width:780px; font-size:20px; }
th, td { border:2px solid #000; padding:10px 14px; text-align:left; line-height:1.6; }
th { background:#f0f0f0; font-size:20px; }
</style></head><body><div class="wrap">
<table>
<tr><th>重要度</th><th>ポイント</th></tr>
<tr><td>★★★★★</td><td>法令・基準書の <strong>数値</strong>（高さ・厚さ・勾配等）を正確に書く</td></tr>
<tr><td>★★★★★</td><td>抽象的表現を避け、<strong>具体的な工法名・専門用語</strong> を使う</td></tr>
<tr><td>★★★★☆</td><td>穴埋め問題は <strong>語句群から選ぶ場合は語句群の言葉をそのまま使う</strong></td></tr>
<tr><td>★★★★☆</td><td>記述問題は <strong>問われた数だけ</strong> 確実に書く（多く書いても減点リスクあり）</td></tr>
<tr><td>★★★☆☆</td><td>漢字の誤字・脱字に注意</td></tr>
</table>
</div></body></html>

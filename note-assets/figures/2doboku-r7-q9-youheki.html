<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; background: #fff; }
  svg { display: block; }
  text { font-family: "Yu Gothic", "Meiryo", sans-serif; }
</style>
</head>
<body>
<svg width="1100" height="700" viewBox="0 0 1100 700" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect x="0" y="0" width="1100" height="700" fill="#ffffff"/>

  <!-- 現地盤ライン（左側） -->
  <line x1="60" y1="300" x2="330" y2="300" stroke="#000" stroke-width="3"/>
  <!-- 現地盤ライン（右側） -->
  <line x1="770" y1="300" x2="1040" y2="300" stroke="#000" stroke-width="3"/>

  <!-- 地盤ハッチング（左） -->
  <g stroke="#000" stroke-width="1.5">
    <line x1="80"  y1="300" x2="65"  y2="318"/>
    <line x1="110" y1="300" x2="95"  y2="318"/>
    <line x1="140" y1="300" x2="125" y2="318"/>
    <line x1="170" y1="300" x2="155" y2="318"/>
    <line x1="200" y1="300" x2="185" y2="318"/>
    <line x1="230" y1="300" x2="215" y2="318"/>
    <line x1="260" y1="300" x2="245" y2="318"/>
    <line x1="290" y1="300" x2="275" y2="318"/>
    <line x1="320" y1="300" x2="305" y2="318"/>
  </g>
  <!-- 地盤ハッチング（右） -->
  <g stroke="#000" stroke-width="1.5">
    <line x1="790"  y1="300" x2="775"  y2="318"/>
    <line x1="820"  y1="300" x2="805"  y2="318"/>
    <line x1="850"  y1="300" x2="835"  y2="318"/>
    <line x1="880"  y1="300" x2="865"  y2="318"/>
    <line x1="910"  y1="300" x2="895"  y2="318"/>
    <line x1="940"  y1="300" x2="925"  y2="318"/>
    <line x1="970"  y1="300" x2="955"  y2="318"/>
    <line x1="1000" y1="300" x2="985"  y2="318"/>
    <line x1="1030" y1="300" x2="1015" y2="318"/>
  </g>

  <!-- 掘削線（床掘の法面と底面） -->
  <polyline points="330,300 430,560 670,560 770,300" fill="none" stroke="#000" stroke-width="3"/>

  <!-- 基礎（砕石）：円の散らばり表現 -->
  <rect x="440" y="510" width="220" height="50" fill="none" stroke="#000" stroke-width="2.5"/>
  <g fill="none" stroke="#000" stroke-width="1.5">
    <circle cx="460" cy="525" r="7"/>
    <circle cx="485" cy="545" r="8"/>
    <circle cx="510" cy="523" r="6"/>
    <circle cx="535" cy="544" r="7"/>
    <circle cx="558" cy="524" r="8"/>
    <circle cx="583" cy="545" r="6"/>
    <circle cx="607" cy="524" r="7"/>
    <circle cx="632" cy="544" r="7"/>
    <circle cx="648" cy="522" r="6"/>
  </g>

  <!-- 重力式擁壁本体（上が狭く、下が広い台形。前面（右）はほぼ鉛直、背面（左）は傾斜） -->
  <polygon points="560,120 600,120 615,510 470,510" fill="none" stroke="#000" stroke-width="3.5"/>

  <!-- 引き出し線：コンクリート重力式擁壁 -->
  <line x1="608" y1="160" x2="760" y2="100" stroke="#000" stroke-width="2"/>
  <text x="770" y="95" font-size="30" fill="#000">コンクリート重力式擁壁</text>

  <!-- 引き出し線：現地盤 -->
  <line x1="900" y1="298" x2="900" y2="240" stroke="#000" stroke-width="2"/>
  <text x="860" y="228" font-size="30" fill="#000">現地盤</text>

  <!-- 出典表記 -->
  <text x="60" y="668" font-size="20" fill="#666">令和7年度 2級土木施工管理技術検定 第二次検定 問題9より（図は当サイトで再作成）</text>
</svg>
</body>
</html>
